<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôle LED RGB - Tiva C</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        h1 {
            margin-bottom: 25px;
            font-size: 24px;
            color: #00adb5;
        }
        .control-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        .preview-box {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            margin-top: 25px;
            border: 2px solid #444;
            transition: background-color 0.1s ease;
            background-color: rgb(10, 10, 10);
        }
        .value-display {
            float: right;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Contrôle LED RGB</h1>
    
    <div class="control-group">
        <label for="red">Rouge <span id="redVal" class="value-display">10</span></label>
        <input type="range" id="red" min="0" max="255" value="10">
    </div>

    <div class="control-group">
        <label for="green">Vert <span id="greenVal" class="value-display">10</span></label>
        <input type="range" id="green" min="0" max="255" value="10">
    </div>

    <div class="control-group">
        <label for="blue">Bleu <span id="blueVal" class="value-display">10</span></label>
        <input type="range" id="blue" min="0" max="255" value="10">
    </div>

    <div id="preview" class="preview-box"></div>
</div>

<script>
    const redSlider = document.getElementById('red');
    const greenSlider = document.getElementById('green');
    const blueSlider = document.getElementById('blue');
    
    const redVal = document.getElementById('redVal');
    const greenVal = document.getElementById('greenVal');
    const blueVal = document.getElementById('blueVal');
    const preview = document.getElementById('preview');

    // Fonction pour envoyer les données au serveur Node.js
    async function updateLED() {
        const r = redSlider.value;
        const g = greenSlider.value;
        const b = blueSlider.value;

        // Mise à jour des textes et de la box de prévisualisation web
        redVal.textContent = r;
        greenVal.textContent = g;
        blueVal.textContent = b;
        preview.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        // Envoi de la requête POST à notre API
        try {
            await fetch('/api/led', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ r: parseInt(r), g: parseInt(g), b: parseInt(b) })
            });
        } catch (error) {
            console.error('Erreur lors de l\'envoi HTTP :', error);
        }
    }

    // Écoute des changements sur les sliders en temps réel
    redSlider.addEventListener('input', updateLED);
    greenSlider.addEventListener('input', updateLED);
    blueSlider.addEventListener('input', updateLED);
</script>

</body>
</html>
